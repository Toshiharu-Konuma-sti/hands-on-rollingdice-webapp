image: gradle:8-jdk21

variables:
  GRADLE_OPTS: "-Dorg.gradle.daemon=false"
  GRADLE_USER_HOME: "${CI_PROJECT_DIR}/.gradle"

cache:
  key: "${CI_COMMIT_REF_SLUG}"
  paths:
    - .gradle/wrapper
    - .gradle/caches

stages:
  - build
  - test
  - doc
  - release
  - pages

before_script:
  - echo "--- Setup Tools ---"
  - chmod +x gradlew

build_job:
  stage: build
  script:
    - ./gradlew clean assemble -x cyclonedxBom
    - echo "--- Display the result of ls ---"
    - ls -R build/libs/
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - build/libs/*.jar

test_job:
  stage: test
  script:
    - ./gradlew test spotbugsMain pmdMain checkstyleMain -x cyclonedxBom
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - build/reports/
    reports:
      junit: build/test-results/test/**/TEST-*.xml

doc_job:
  stage: doc
  script:
    - echo "--- Javadoc Generation ---"
    - ./gradlew javadoc -x cyclonedxBom --info
    - echo "--- Show generated files ---"
    - ls -R build/docs/
  artifacts:
    when: always
    expire_in: 1 week
    paths:
      - build/docs/

publish_job:
  stage: release
  needs: ["build_job", "test_job"]
  script:
    # upload to the package registory
    - ./gradlew publish -x cyclonedxBom --no-configuration-cache

pages:
  stage: pages
  needs:
    - job: test_job
      artifacts: true
    - job: doc_job
      artifacts: true
  script:
    - mkdir -p public/test-report public/spotbugs public/pmd public/checkstyle public/javadoc
    - |
      cat <<'EOF' > public/index.html
      <!DOCTYPE html>
      <html lang="ja">
      <head><meta charset="UTF-8"><title>webapp-webui Report</title></head>
      <body>
        <h1>webapp-webui パイプライン成果物</h1>
        <ul>
          <li><a href="test-report/">テストレポート</a></li>
          <li><a href="spotbugs/">SpotBugs レポート</a></li>
          <li><a href="pmd/">PMD レポート</a></li>
          <li><a href="checkstyle/">Checkstyle レポート</a></li>
          <li><a href="javadoc/">Javadoc</a></li>
        </ul>
      </body>
      </html>
      EOF
    - cp -r build/reports/tests/test/. public/test-report/ || true
    - cp -r build/reports/spotbugs/. public/spotbugs/ || true
    - cp build/reports/spotbugs/main.html public/spotbugs/index.html || true
    - cp -r build/reports/pmd/. public/pmd/ || true
    - cp build/reports/pmd/main.html public/pmd/index.html || true
    - cp -r build/reports/checkstyle/. public/checkstyle/ || true
    - cp build/reports/checkstyle/main.html public/checkstyle/index.html || true
    - cp -r build/docs/javadoc/. public/javadoc/ || true
  artifacts:
    paths:
      - public
